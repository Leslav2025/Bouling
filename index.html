<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UA 3D Боулінг Клуб</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background-color: #0d131a;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 10px;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            color: #f39c12;
            margin: 5px 0;
            font-size: 22px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
        }

        #scoreboard {
            display: flex;
            justify-content: space-between;
            background: rgba(28, 40, 51, 0.9);
            padding: 10px 15px;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            font-size: 15px;
            border: 1px solid #2c3e50;
            margin-bottom: 8px;
            z-index: 10;
        }

        #canvas-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 60vh;
            border: 3px solid #2c3e50;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.7);
        }

        #controls {
            width: 100%;
            max-width: 400px;
            text-align: center;
            margin-top: 10px;
            z-index: 10;
        }

        .status-msg {
            font-size: 16px;
            font-weight: bold;
            color: #f1c40f;
            margin-bottom: 8px;
            height: 20px;
            text-shadow: 0 1px 2px #000;
        }

        button {
            background: linear-gradient(135deg, #f39c12, #d35400);
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(243, 156, 18, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s, transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }

        button.ready-to-shoot {
            background: linear-gradient(135deg, #27ae60, #219653);
            box-shadow: 0 4px 10px rgba(39, 174, 96, 0.4);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background: #7f8c8d;
            box-shadow: none;
            transform: none;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <h1>3D Bowling Club</h1>

    <div id="scoreboard">
        <div>Фрейм: <span id="frame-val">1</span>/10</div>
        <div>Кидок: <span id="roll-val">1</span></div>
        <div>Очки: <span id="score-val">0</span></div>
    </div>

    <div id="canvas-container"></div>

    <div id="controls">
        <div class="status-msg" id="status-text">Оберіть напрямок кидка!</div>
        <button id="action-btn">Зафіксувати приціл</button>
    </div>

    <script>
        let currentFrame = 1;
        let currentRoll = 1;
        let totalScore = 0;
        let pinsLeft = 10;
        let rolls = [];

        // Стани гри: 'aiming' (прицілювання), 'ready' (приціл зафіксовано, чекаємо кидка), 'rolling' (куля котиться)
        let gameState = 'aiming'; 
        
        let angle = 0;
        let angleDirection = 1;
        let ballVelocityX = 0;
        let ballVelocityZ = 0;

        let scene, camera, renderer;
        let ball, lane, aimerLine;
        let pins = [];
        const pinPositions = [
            {x: 0, z: -15}, 
            {x: -0.4, z: -15.6}, {x: 0.4, z: -15.6}, 
            {x: -0.8, z: -16.2}, {x: 0, z: -16.2}, {x: 0.8, z: -16.2}, 
            {x: -1.2, z: -16.8}, {x: -0.4, z: -16.8}, {x: 0.4, z: -16.8}, {x: 1.2, z: -16.8} 
        ];

        const container = document.getElementById('canvas-container');
        const actionBtn = document.getElementById('action-btn');
        const statusText = document.getElementById('status-text');

        init3D();
        animate();

        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0d131a);
            scene.fog = new THREE.FogExp2(0x0d131a, 0.05);

            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
            camera.position.set(0, 2.5, 5);
            camera.lookAt(0, 0.5, -10);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            const spotLight = new THREE.SpotLight(0xffeaa7, 1);
            spotLight.position.set(0, 10, 2);
            spotLight.castShadow = true;
            scene.add(spotLight);

            const laneGeo = new THREE.BoxGeometry(3.5, 0.1, 25);
            const laneMat = new THREE.MeshStandardMaterial({ color: 0xd35400, roughness: 0.1, metalness: 0.1 });
            lane = new THREE.Mesh(laneGeo, laneMat);
            lane.position.set(0, -0.05, -7.5);
            lane.receiveShadow = true;
            scene.add(lane);

            const wallGeo = new THREE.BoxGeometry(0.2, 0.5, 25);
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x2c3e50 });
            const leftWall = new THREE.Mesh(wallGeo, wallMat);
            leftWall.position.set(-1.85, 0.2, -7.5);
            scene.add(leftWall);
            const rightWall = leftWall.clone();
            rightWall.position.x = 1.85;
            scene.add(rightWall);

            const ballGeo = new THREE.SphereGeometry(0.25, 32, 32);
            const ballMat = new THREE.MeshStandardMaterial({ color: 0x9b59b6, roughness: 0.2, metalness: 0.5 });
            ball = new THREE.Mesh(ballGeo, ballMat);
            ball.position.set(0, 0.25, 3);
            ball.castShadow = true;
            scene.add(ball);

            const points = [new THREE.Vector3(0, 0.05, 3), new THREE.Vector3(0, 0.05, 0)];
            const aimerGeo = new THREE.BufferGeometry().setFromPoints(points);
            const aimerMat = new THREE.LineBasicMaterial({ color: 0xf1c40f, linewidth: 2 });
            aimerLine = new THREE.Line(aimerGeo, aimerMat);
            scene.add(aimerLine);

            createPins();
        }

        function createPins() {
            pins.forEach(p => scene.remove(p.mesh));
            pins = [];

            const pinMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3 });
            const stripeMat = new THREE.MeshBasicMaterial({ color: 0xe74c3c });

            pinPositions.forEach((pos) => {
                const pinGroup = new THREE.Group();

                const body = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.12, 0.5, 16), pinMat);
                body.position.y = 0.25;
                body.castShadow = true;
                pinGroup.add(body);

                const head = new THREE.Mesh(new THREE.SphereGeometry(0.07, 16, 16), pinMat);
                head.position.y = 0.53;
                pinGroup.add(head);

                const stripe = new THREE.Mesh(new THREE.CylinderGeometry(0.085, 0.085, 0.04, 16), stripeMat);
                stripe.position.y = 0.42;
                pinGroup.add(stripe);

                pinGroup.position.set(pos.x, 0, pos.z);
                scene.add(pinGroup);

                pins.push({
                    mesh: pinGroup, active: true,
                    vx: 0, vy: 0, vz: 0, rotX: 0, rotZ: 0
                });
            });
        }

        function animate() {
            requestAnimationFrame(animate);

            // Оновлення прицілу працює тільки в стані 'aiming'
            if (gameState === 'aiming') {
                angle += angleDirection * 0.03;
                if (angle > 0.6 || angle < -0.6) {
                    angleDirection *= -1;
                }
                const targetX = Math.sin(angle) * 3;
                const targetZ = 3 - Math.cos(angle) * 3;
                
                const positions = aimerLine.geometry.attributes.position.array;
                positions[3] = targetX;
                positions[5] = targetZ;
                aimerLine.geometry.attributes.position.needsUpdate = true;
            }

            // Рух кулі
            if (gameState === 'rolling') {
                ball.position.x += ballVelocityX;
                ball.position.z += ballVelocityZ;
                ball.rotation.x -= 0.15;

                pins.forEach(pin => {
                    if (pin.active) {
                        const dist = ball.position.distanceTo(pin.mesh.position);
                        if (dist < 0.4) {
                            pin.active = false;
                            pin.vz = ballVelocityZ * 0.8;
                            pin.vx = (pin.mesh.position.x - ball.position.x) * 0.5;
                            pin.vy = 0.15;
                            pin.rotX = Math.random() * 0.2;
                            pin.rotZ = (Math.random() - 0.5) * 0.2;
                        }
                    }
                });

                if (ball.position.z < -20) {
                    gameState = 'calculating';
                    calculateFrameResult();
                }
            }

            // Фізика збитих кеглів
            pins.forEach(pin => {
                if (!pin.active && Math.abs(pin.mesh.position.z) < 25) {
                    pin.mesh.position.x += pin.vx;
                    pin.mesh.position.y += pin.vy;
                    pin.mesh.position.z += pin.vz;
                    
                    if (pin.mesh.position.y > 0) {
                        pin.vy -= 0.01;
                    } else {
                        pin.mesh.position.y = 0;
                        pin.vx *= 0.8;
                        pin.vz *= 0.8;
                    }
                    pin.mesh.rotation.x += pin.rotX;
                    pin.mesh.rotation.z += pin.rotZ;
                }
            });

            renderer.render(scene, camera);
        }

        // Логіка єдиної інтерактивної кнопки
        actionBtn.addEventListener('click', () => {
            if (gameState === 'aiming') {
                // Фіксуємо приціл
                gameState = 'ready';
                actionBtn.innerText = "Кидок!";
                actionBtn.classList.add('ready-to-shoot');
                statusText.innerText = "Напрямок зафіксовано. Запускай кулю!";
            } 
            else if (gameState === 'ready') {
                // Запускаємо кулю
                gameState = 'rolling';
                actionBtn.disabled = true;
                actionBtn.classList.remove('ready-to-shoot');
                aimerLine.visible = false;
                statusText.innerText = "Куля котиться до кеглів...";

                const speed = 0.35;
                ballVelocityX = Math.sin(angle) * speed;
                ballVelocityZ = -Math.cos(angle) * speed;
            }
        });

        function calculateFrameResult() {
            let hitCount = 0;
            pins.forEach(pin => {
                if (!pin.active && pin.mesh.visible) {
                    pin.mesh.visible = false;
                    hitCount++;
                }
            });

            pinsLeft -= hitCount;
            rolls.push(hitCount);
            updateScoreDisplay();

            if (currentRoll === 1) {
                if (pinsLeft === 0) {
                    statusText.innerText = "💥 STRIIIIKE! 💥";
                    rolls.push(0);
                    endFrame();
                } else {
                    statusText.innerText = `Збито: ${hitCount}. Готуйся до 2-го кидка!`;
                    currentRoll = 2;
                    document.getElementById('roll-val').innerText = currentRoll;
                    resetBallOnly();
                }
            } else {
                if (pinsLeft === 0) {
                    statusText.innerText = "✨ SPARE! ✨";
                } else {
                    statusText.innerText = `Результат фрейму: ${10 - pinsLeft} кеглів`;
                }
                endFrame();
            }
        }

        function updateScoreDisplay() {
            let score = 0;
            let rollIndex = 0;

            for (let frame = 0; frame < currentFrame; frame++) {
                if (rollIndex >= rolls.length) break;

                if (rolls[rollIndex] === 10) { 
                    score += 10 + (rolls[rollIndex + 1] || 0) + (rolls[rollIndex + 2] || 0);
                    rollIndex += 2;
                } else if ((rolls[rollIndex] + (rolls[rollIndex + 1] || 0)) === 10) { 
                    score += 10 + (rolls[rollIndex + 2] || 0);
                    rollIndex += 2;
                } else {
                    score += (rolls[rollIndex] || 0) + (rolls[rollIndex + 1] || 0);
                    rollIndex += 2;
                }
            }
            totalScore = score;
            document.getElementById('score-val').innerText = totalScore;
        }

        function resetBallOnly() {
            setTimeout(() => {
                ball.position.set(0, 0.25, 3);
                aimerLine.visible = true;
                
                // Повертаємо стан прицілювання
                gameState = 'aiming';
                actionBtn.innerText = "Зафіксувати приціл";
                actionBtn.disabled = false;
                statusText.innerText = "Оберіть напрямок другого кидка!";
            }, 1000);
        }

        function endFrame() {
            setTimeout(() => {
                currentFrame++;
                
                if (currentFrame > 10) {
                    statusText.innerText = `Гру закінчено! Твій рахунок: ${totalScore}`;
                    actionBtn.innerText = "ЗІГРАТИ ЗНОВУ";
                    actionBtn.disabled = false;
                    actionBtn.onclick = () => { location.reload(); };
                    return;
                }

                currentRoll = 1;
                pinsLeft = 10;
                
                document.getElementById('frame-val').innerText = currentFrame;
                document.getElementById('roll-val').innerText = currentRoll;
                
                ball.position.set(0, 0.25, 3);
                createPins();
                
                aimerLine.visible = true;
                gameState = 'aiming';
                actionBtn.innerText = "Зафіксувати приціл";
                actionBtn.disabled = false;
                statusText.innerText = "Оберіть напрямок кидка!";
            }, 1500);
        }

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
    </script>
</body>
</html>
