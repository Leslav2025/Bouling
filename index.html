<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UA 3D Боулінг Клуб</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background-color: #0d131a;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 10px;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            color: #f39c12;
            margin: 5px 0;
            font-size: 22px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
        }

        #scoreboard {
            display: flex;
            flex-direction: column;
            background: rgba(28, 40, 51, 0.9);
            padding: 8px 15px;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            font-size: 14px;
            border: 1px solid #2c3e50;
            margin-bottom: 8px;
            z-index: 10;
            gap: 5px;
        }

        .score-row {
            display: flex;
            justify-content: space-between;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            border-top: 1px dashed #34495e;
            padding-top: 4px;
            font-size: 13px;
            align-items: center;
        }

        #high-score-container { color: #f1c40f; font-weight: bold; }
        #coins-container { color: #2ecc71; font-weight: bold; }

        .top-buttons {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 400px;
            margin-bottom: 6px;
        }

        #open-shop-btn, #open-withdraw-btn {
            flex: 1;
            background: #1c2833; 
            border: 1px solid #f39c12; 
            color: #f39c12;
            padding: 8px 12px; 
            font-size: 13px; 
            border-radius: 5px; 
            cursor: pointer;
            font-weight: bold; 
            text-align: center;
            -webkit-tap-highlight-color: transparent;
        }
        #open-withdraw-btn {
            border-color: #2ecc71;
            color: #2ecc71;
        }

        #canvas-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 50vh;
            border: 3px solid #2c3e50;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.7);
        }

        #power-bar-container {
            position: absolute;
            left: 15px;
            bottom: 20px;
            width: 24px;
            height: 140px;
            background: rgba(0,0,0,0.5);
            border: 2px solid #fff;
            border-radius: 5px;
            display: none;
            flex-direction: column-reverse;
            overflow: hidden;
        }

        #power-bar-fill {
            width: 100%;
            height: 0%;
            background: linear-gradient(to top, #2ecc71, #f1c40f, #e74c3c);
            transition: height 0.05s linear;
        }

        #shop-overlay, #withdraw-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(13, 19, 26, 0.98);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 100;
        }

        #shop-overlay h2, #withdraw-overlay h2 { color: #f39c12; margin-top: 0; margin-bottom: 10px; }

        .shop-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
            max-height: 260px;
            overflow-y: auto;
            margin-bottom: 15px;
            padding-right: 5px;
        }

        .shop-item {
            background: #1c2833;
            border: 2px solid #34495e;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .shop-item.selected { border-color: #2ecc71; background: #143d24; }
        .shop-item.owned { border-color: #f39c12; }

        .ball-preview {
            width: 36px; height: 36px; border-radius: 50%; margin: 0 auto 6px;
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.5), 0 4px 6px rgba(0,0,0,0.3);
        }

        .item-name { font-weight: bold; font-size: 12px; margin-bottom: 4px; }
        .item-price { font-size: 11px; color: #2ecc71; font-weight: bold; }

        .withdraw-form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
            align-items: center;
        }
        .withdraw-form input {
            background: #1c2833;
            border: 1px solid #34495e;
            padding: 12px;
            color: white;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            text-align: center;
            width: 100%;
        }
        .withdraw-form input:focus { border-color: #2ecc71; }
        
        #ton-connect-btn-container {
            margin: 5px 0;
            display: flex;
            justify-content: center;
            width: 100%;
        }
        
        #wallet-address-display {
            font-size: 11px;
            color: #2ecc71;
            word-break: break-all;
            background: rgba(46, 204, 113, 0.1);
            padding: 6px;
            border-radius: 5px;
            width: 100%;
            text-align: center;
            display: none;
        }

        .withdraw-info {
            font-size: 12px;
            color: #95a5a6;
            text-align: center;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .close-btn {
            background: #34495e; color: white; border: none; padding: 10px 20px;
            border-radius: 5px; font-weight: bold; cursor: pointer; width: 100%; max-width: 200px;
        }

        #controls {
            width: 100%;
            max-width: 400px;
            text-align: center;
            margin-top: 6px;
            z-index: 10;
        }

        .status-msg {
            font-size: 15px;
            font-weight: bold;
            color: #f1c40f;
            margin-bottom: 6px;
            height: 20px;
            text-shadow: 0 1px 2px #000;
        }

        button.main-action {
            background: linear-gradient(135deg, #f39c12, #d35400);
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            font-size: 17px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(243, 156, 18, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s, transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }

        button.ready-to-shoot {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            box-shadow: 0 4px 10px rgba(231, 76, 60, 0.4);
        }

        button:disabled { background: #7f8c8d; box-shadow: none; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
</head>
<body>

    <h1>3D Bowling Club</h1>

    <div id="scoreboard">
        <div class="score-row">
            <div>Фрейм: <span id="frame-val">1</span>/10</div>
            <div>Кидок: <span id="roll-val">1</span></div>
            <div>Очки: <span id="score-val">0</span></div>
        </div>
        <div class="stats-row">
            <div id="high-score-container">⭐ Рекорд: <span id="high-score-val">0</span></div>
            <div id="coins-container">Баланс: <span id="coins-val">0</span> UA</div>
        </div>
    </div>

    <div class="top-buttons">
        <button id="open-shop-btn">🛒 МАГАЗИН КУЛЬ</button>
        <button id="open-withdraw-btn">💸 ВИВЕСТИ UA</button>
    </div>

    <div id="canvas-container">
        <div id="power-bar-container">
            <div id="power-bar-fill"></div>
        </div>

        <div id="shop-overlay" style="display: none;">
            <h2>Магазин куль</h2>
            <div class="shop-grid" id="shop-grid"></div>
            <button class="close-btn" id="close-shop-btn">Назад</button>
        </div>

        <div id="withdraw-overlay" style="display: none;">
            <h2>Виведення токенів UA</h2>
            <div class="withdraw-info">Мінімальна сума: 50 UA.<br>Підключіть гаманець TON для автоматичного визначення адреси.</div>
            
            <div class="withdraw-form">
                <div id="ton-connect-btn-container"></div>
                <div id="wallet-address-display"></div>

                <input type="number" id="withdraw-amount" placeholder="Сума UA для виведення">
                <button class="main-action" id="submit-withdraw-btn" style="padding: 10px; font-size: 14px;" disabled>ПІДКЛЮЧІТЬ ГАМАНЕЦЬ</button>
            </div>
            <button class="close-btn" id="close-withdraw-btn">Назад</button>
        </div>
    </div>

    <div id="controls">
        <div class="status-msg" id="status-text">Оберіть напрямок кидка!</div>
        <button id="action-btn" class="main-action">Зафіксувати приціл</button>
    </div>

    <script>
        let currentFrame = 1;
        let currentRoll = 1;
        let totalScore = 0;
        let pinsLeft = 10;
        let rolls = [];

        let highScore = localStorage.getItem('bowling_high_score') || 0;
        let coins = parseInt(localStorage.getItem('bowling_coins')) || 0;
        let ownedBalls = JSON.parse(localStorage.getItem('bowling_owned_balls')) || ['classic'];
        let currentBallSkin = localStorage.getItem('bowling_current_ball') || 'classic';

        const ballSkins = {
            classic: { name: 'Класична 7', price: 0, color: '#8e44ad', stripe: '#f1c40f', text: '7', speedMult: 1.0, coinMult: 1 },
            lime: { name: 'Неоновий Лайм', price: 50, color: '#2ecc71', stripe: '#ffffff', text: '$', speedMult: 0.95, coinMult: 1.2 },
            fire: { name: 'Магма Вогонь', price: 100, color: '#e74c3c', stripe: '#2c3e50', text: '🔥', speedMult: 0.9, coinMult: 1.5 },
            ua: { name: 'Патріотична UA', price: 150, color: '#2980b9', stripe: '#f1c40f', text: 'UA', speedMult: 0.82, coinMult: 2 },
            gold: { name: 'Золотий Злиток', price: 300, color: '#d4af37', stripe: '#ffffff', text: '🏆', speedMult: 0.75, coinMult: 3 },
            vip: { name: 'Діамантовий VIP', price: 500, color: '#00eeee', stripe: '#111111', text: '💎', speedMult: 0.65, coinMult: 5 }
        };

        let gameState = 'aiming'; 
        let angle = 0;
        let angleDirection = 1;
        let ballVelocityX = 0;
        let ballVelocityZ = 0;
        let powerValue = 0;
        let powerDirection = 1;

        let scene, camera, renderer, ball, lane, aimerLine, ballMaterial;
        let pins = [];
        const pinPositions = [
            {x: 0, z: -15}, 
            {x: -0.4, z: -15.6}, {x: 0.4, z: -15.6}, 
            {x: -0.8, z: -16.2}, {x: 0, z: -16.2}, {x: 0.8, z: -16.2}, 
            {x: -1.2, z: -16.8}, {x: -0.4, z: -16.8}, {x: 0.4, z: -16.8}, {x: 1.2, z: -16.8} 
        ];

        const container = document.getElementById('canvas-container');
        const actionBtn = document.getElementById('action-btn');
        const statusText = document.getElementById('status-text');
        const powerContainer = document.getElementById('power-bar-container');
        const powerFill = document.getElementById('power-bar-fill');
        const shopOverlay = document.getElementById('shop-overlay');
        const withdrawOverlay = document.getElementById('withdraw-overlay');

        document.getElementById('high-score-val').innerText = highScore;
        document.getElementById('coins-val').innerText = coins;

        let audioCtx = null;
        let rollSoundNode = null;

        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

        function playBuySound() {
            initAudio();
            const now = audioCtx.currentTime;
            [300, 400, 500, 650].forEach((freq, idx) => {
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(freq, now + idx * 0.08);
                gain.gain.setValueAtTime(0.3, now + idx * 0.08);
                gain.gain.exponentialRampToValueAtTime(0.01, now + idx * 0.08 + 0.15);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now + idx * 0.08); osc.stop(now + idx * 0.08 + 0.15);
            });
        }

        function playSelectSound() {
            initAudio();
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'triangle'; osc.frequency.setValueAtTime(450, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.05);
        }

        function playRollSound() {
            initAudio();
            const bufferSize = audioCtx.sampleRate * 2;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer; noise.loop = true;
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass'; filter.frequency.setValueAtTime(130, audioCtx.currentTime);
            const gain = audioCtx.createGain(); gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
            noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
            noise.start(); rollSoundNode = { source: noise, gain: gain };
        }

        function stopRollSound() { if (rollSoundNode) { try { rollSoundNode.source.stop(); } catch(e){} rollSoundNode = null; } }

        function playHitSound() {
            initAudio();
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'triangle'; osc.frequency.setValueAtTime(280, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(60, audioCtx.currentTime + 0.4);
            gain.gain.setValueAtTime(0.7, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        }

        function createWoodTexture() {
            const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 1024;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#e67e22'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#d35400';
            for (let i = 0; i < canvas.width; i += 32) ctx.fillRect(i, 0, 2, canvas.height);
            ctx.strokeStyle = 'rgba(139, 69, 19, 0.15)'; ctx.lineWidth = 1;
            for (let j = 0; j < canvas.height; j += 4) {
                ctx.beginPath(); ctx.moveTo(0, j + Math.sin(j*0.05)*5); ctx.lineTo(canvas.width, j + Math.sin(j*0.05)*5); ctx.stroke();
            }
            return new THREE.CanvasTexture(canvas);
        }

        function createBallTexture(skinKey) {
            const cfg = ballSkins[skinKey] || ballSkins['classic'];
            const canvas = document.createElement('canvas'); canvas.width = 512; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = cfg.color; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = cfg.stripe; ctx.fillRect(0, 100, canvas.width, 56);
            ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(256, 128, 40, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#000000'; ctx.font = 'bold 40px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(cfg.text, 256, 128);
            return new THREE.CanvasTexture(canvas);
        }

        init3D();
        animate();
        renderShop();

        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0d131a);
            scene.fog = new THREE.FogExp2(0x0d131a, 0.05);

            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
            camera.position.set(0, 2.3, 5);
            camera.lookAt(0, 0.4, -10);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const spotLight = new THREE.SpotLight(0xffffff, 1);
            spotLight.position.set(0, 12, 4); spotLight.castShadow = true;
            scene.add(spotLight);

            lane = new THREE.Mesh(new THREE.BoxGeometry(3.5, 0.1, 25), new THREE.MeshStandardMaterial({ map: createWoodTexture(), roughness: 0.1, metalness: 0.1 }));
            lane.position.set(0, -0.05, -7.5); lane.receiveShadow = true;
            scene.add(lane);

            const wallMat = new THREE.MeshStandardMaterial({ color: 0x1f2d3d, roughness: 0.5 });
            const leftWall = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.4, 25), wallMat);
            leftWall.position.set(-1.82, 0.15, -7.5); scene.add(leftWall);
            const rightWall = leftWall.clone(); rightWall.position.x = 1.82; scene.add(rightWall);

            ballMaterial = new THREE.MeshStandardMaterial({ map: createBallTexture(currentBallSkin), roughness: 0.05, metalness: 0.2 });
            ball = new THREE.Mesh(new THREE.SphereGeometry(0.25, 32, 32), ballMaterial);
            ball.position.set(0, 0.25, 3); ball.castShadow = true;
            scene.add(ball);

            const points = [new THREE.Vector3(0, 0.06, 3), new THREE.Vector3(0, 0.06, -1)];
            aimerLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints(points), new THREE.LineBasicMaterial({ color: 0x00ffff, linewidth: 5 }));
            scene.add(aimerLine);

            createPins();
        }

        function createPins() {
            pins.forEach(p => scene.remove(p.mesh)); pins = [];
            const pinMat = new THREE.MeshStandardMaterial({ color: 0xf5f6fa, roughness: 0.2 });
            const stripeMat = new THREE.MeshBasicMaterial({ color: 0xd63031 });

            pinPositions.forEach((pos) => {
                const pinGroup = new THREE.Group();
                const body = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.12, 0.5, 16), pinMat); body.position.y = 0.25; body.castShadow = true; pinGroup.add(body);
                const head = new THREE.Mesh(new THREE.SphereGeometry(0.07, 16, 16), pinMat); head.position.y = 0.53; pinGroup.add(head);
                const stripe = new THREE.Mesh(new THREE.CylinderGeometry(0.083, 0.083, 0.04, 16), stripeMat); stripe.position.y = 0.42; pinGroup.add(stripe);
                pinGroup.position.set(pos.x, 0, pos.z); scene.add(pinGroup);
                pins.push({ mesh: pinGroup, active: true, vx: 0, vy: 0, vz: 0, rotX: 0, rotZ: 0 });
            });
        }

        function animate() {
            requestAnimationFrame(animate);

            if (gameState === 'aiming') {
                const ballSpeedModifier = ballSkins[currentBallSkin]?.speedMult || 1.0;
                angle += angleDirection * (0.011 * ballSpeedModifier);
                
                if (angle > 0.55 || angle < -0.55) angleDirection *= -1;
                const targetX = Math.sin(angle) * 4; const targetZ = 3 - Math.cos(angle) * 4;
                const positions = aimerLine.geometry.attributes.position.array;
                positions[3] = targetX; positions[5] = targetZ;
                aimerLine.geometry.attributes.position.needsUpdate = true;
            }

            if (gameState === 'power') {
                powerValue += powerDirection * 2.5;
                if (powerValue > 100 || powerValue < 0) powerDirection *= -1;
                powerFill.style.height = powerValue + '%';
            }

            if (gameState === 'rolling') {
                ball.position.x += ballVelocityX; ball.position.z += ballVelocityZ;
                ball.rotation.x -= 0.18; ball.rotation.y += ballVelocityX * 0.5;

                let playHit = false;
                pins.forEach(pin => {
                    if (pin.active) {
                        if (ball.position.distanceTo(pin.mesh.position) < 0.42) {
                            pin.active = false; pin.vz = ballVelocityZ * 0.85;
                            pin.vx = (pin.mesh.position.x - ball.position.x) * 0.6; pin.vy = 0.18;
                            pin.rotX = Math.random() * 0.25; pin.rotZ = (Math.random() - 0.5) * 0.25;
                            playHit = true;
                        }
                    }
                });
                if (playHit) playHitSound();
                if (ball.position.z < -20) { gameState = 'calculating'; stopRollSound(); calculateFrameResult(); }
            }

            pins.forEach(pin => {
                if (!pin.active && Math.abs(pin.mesh.position.z) < 25) {
                    pin.mesh.position.x += pin.vx; pin.mesh.position.y += pin.vy; pin.mesh.position.z += pin.vz;
                    if (pin.mesh.position.y > 0) pin.vy -= 0.012; else { pin.mesh.position.y = 0; pin.vx *= 0.85; pin.vz *= 0.85; }
                    pin.mesh.rotation.x += pin.rotX; pin.mesh.rotation.z += pin.rotZ;
                }
            });
            renderer.render(scene, camera);
        }

        actionBtn.addEventListener('click', () => {
            initAudio();
            if (gameState === 'aiming') {
                gameState = 'power'; powerValue = 0; powerDirection = 1;
                powerContainer.style.display = 'flex';
                actionBtn.innerText = "КИДОК!"; actionBtn.classList.add('ready-to-shoot');
                statusText.innerText = "Впіймай максимальну силу!";
            } 
            else if (gameState === 'power') {
                gameState = 'rolling'; actionBtn.disabled = true; actionBtn.classList.remove('ready-to-shoot');
                aimerLine.visible = false; powerContainer.style.display = 'none';
                statusText.innerText = "Куля котиться...";
                playRollSound();
                const speed = 0.15 + (powerValue / 100) * 0.27;
                ballVelocityX = Math.sin(angle) * speed; ballVelocityZ = -Math.cos(angle) * speed;
            }
        });

        function calculateFrameResult() {
            let hitCount = 0;
            pins.forEach(pin => { if (!pin.active && pin.mesh.visible) { pin.mesh.visible = false; hitCount++; } });
            pinsLeft -= hitCount; rolls.push(hitCount);
            
            addCoins(hitCount);
            updateScoreDisplay();

            if (currentRoll === 1) {
                if (pinsLeft === 0) {
                    statusText.innerText = "💥 STRIIIIKE! (+10 UA базово) 💥";
                    addCoins(10); rolls.push(0); endFrame();
                } else {
                    statusText.innerText = `Збито: ${hitCount}. Другий кидок!`;
                    currentRoll = 2; document.getElementById('roll-val').innerText = currentRoll;
                    resetBallOnly();
                }
            } else {
                if (pinsLeft === 0) {
                    statusText.innerText = "✨ SPARE! (+5 UA базово) ✨";
                    addCoins(5);
                } else {
                    statusText.innerText = `Результат фрейму: ${10 - pinsLeft} кеглів`;
                }
                endFrame();
            }
        }

        function addCoins(amount) {
            if (amount <= 0) return;
            const multiplier = ballSkins[currentBallSkin]?.coinMult || 1;
            const total = Math.floor(amount * multiplier);
            coins += total;
            localStorage.setItem('bowling_coins', coins);
            document.getElementById('coins-val').innerText = coins;
        }

        function updateScoreDisplay() {
            let score = 0; let rollIndex = 0;
            for (let frame = 0; frame < currentFrame; frame++) {
                if (rollIndex >= rolls.length) break;
                if (rolls[rollIndex] === 10) { score += 10 + (rolls[rollIndex + 1] || 0) + (rolls[rollIndex + 2] || 0); rollIndex += 2; }
                else if ((rolls[rollIndex] + (rolls[rollIndex + 1] || 0)) === 10) { score += 10 + (rolls[rollIndex + 2] || 0); rollIndex += 2; }
                else { score += (rolls[rollIndex] || 0) + (rolls[rollIndex + 1] || 0); rollIndex += 2; }
            }
            totalScore = score; document.getElementById('score-val').innerText = totalScore;
            if (totalScore > highScore) { highScore = totalScore; localStorage.setItem('bowling_high_score', highScore); document.getElementById('high-score-val').innerText = highScore; }
        }

        function resetBallOnly() {
            setTimeout(() => {
                ball.position.set(0, 0.25, 3); ball.rotation.set(0, 0, 0); aimerLine.visible = true;
                gameState = 'aiming'; actionBtn.innerText = "Зафіксувати приціл"; actionBtn.disabled = false;
                statusText.innerText = "Оберіть напрямок другого кидка!";
            }, 1000);
        }

        function endFrame() {
            setTimeout(() => {
                currentFrame++;
                if (currentFrame > 10) {
                    statusText.innerText = `Гру закінчено! Рахунок: ${totalScore}`;
                    actionBtn.innerText = "ЗІГРАТИ ЗНОВУ"; actionBtn.disabled = false;
                    actionBtn.onclick = () => { location.reload(); }; return;
                }
                currentRoll = 1; pinsLeft = 10;
                document.getElementById('frame-val').innerText = currentFrame; document.getElementById('roll-val').innerText = currentRoll;
                ball.position.set(0, 0.25, 3); ball.rotation.set(0, 0, 0); createPins();
                aimerLine.visible = true; gameState = 'aiming';
                actionBtn.innerText = "Зафіксувати приціл"; actionBtn.disabled = false;
                statusText.innerText = "Оберіть напрямок кидка!";
            }, 1500);
        }

        function renderShop() {
            const grid = document.getElementById('shop-grid');
            grid.innerHTML = '';
            Object.keys(ballSkins).forEach(key => {
                const item = ballSkins[key];
                const isOwned = ownedBalls.includes(key);
                const isSelected = currentBallSkin === key;
                const div = document.createElement('div');
                div.className = `shop-item ${isSelected ? 'selected' : ''} ${isOwned ? 'owned' : ''}`;
                
                let label = isSelected ? 'Обрано' : (isOwned ? 'В наявності' : `${item.price} UA`);
                let bonusInfo = item.coinMult > 1 ? `<div style="font-size:9px; color:#f1c40f; margin-top:2px;">UA x${item.coinMult}</div>` : '';

                div.innerHTML = `
                    <div class="ball-preview" style="background: ${item.color};"></div>
                    <div class="item-name">${item.name}</div>
                    <div class="item-price" style="color: ${isOwned ? '#f39c12' : '#2ecc71'}">${label}</div>
                    ${bonusInfo}
                `;
                
                div.addEventListener('click', () => {
                    initAudio();
                    if (isOwned) {
                        playSelectSound();
                        currentBallSkin = key; localStorage.setItem('bowling_current_ball', key);
                        ballMaterial.map = createBallTexture(key); ballMaterial.needsUpdate = true; renderShop();
                    } else if (coins >= item.price) {
                        playBuySound();
                        coins -= item.price; ownedBalls.push(key); currentBallSkin = key;
                        localStorage.setItem('bowling_coins', coins); localStorage.setItem('bowling_owned_balls', JSON.stringify(ownedBalls)); localStorage.setItem('bowling_current_ball', key);
                        document.getElementById('coins-val').innerText = coins; ballMaterial.map = createBallTexture(key); ballMaterial.needsUpdate = true; renderShop();
                    } else { alert('Недостатньо UA токенів!'); }
                });
                grid.appendChild(div);
            });
        }

        document.getElementById('open-shop-btn').addEventListener('click', () => { initAudio(); if(gameState==='aiming') shopOverlay.style.display = 'flex'; });
        document.getElementById('close-shop-btn').addEventListener('click', () => { shopOverlay.style.display = 'none'; });

        document.getElementById('open-withdraw-btn').addEventListener('click', () => { initAudio(); if(gameState==='aiming') withdrawOverlay.style.display = 'flex'; });
        document.getElementById('close-withdraw-btn').addEventListener('click', () => { withdrawOverlay.style.display = 'none'; });

        let userWalletAddress = null;
        
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://leslav2025.github.io/Bouling/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-btn-container'
        });

        tonConnectUI.onStatusChange(wallet => {
            const submitBtn = document.getElementById('submit-withdraw-btn');
            const addressDisplay = document.getElementById('wallet-address-display');
            
            if (wallet) {
                userWalletAddress = wallet.account.address;
                const shortAddress = userWalletAddress.slice(0, 6) + '...' + userWalletAddress.slice(-6);
                addressDisplay.innerText = `Ваш гаманець: ${shortAddress}`;
                addressDisplay.style.display = 'block';
                
                submitBtn.disabled = false;
                submitBtn.innerText = "ВИВЕСТИ НА ГАМАНЕЦЬ";
            } else {
                userWalletAddress = null;
                addressDisplay.style.display = 'none';
                submitBtn.disabled = true;
                submitBtn.innerText = "ПІДКЛЮЧІТЬ ГАМАНЕЦЬ";
            }
        });

        // НАДІЙНИЙ БАГАТОРАЗОВИЙ ВИВІД КОШТІВ
        document.getElementById('submit-withdraw-btn').addEventListener('click', () => {
            const amount = parseInt(document.getElementById('withdraw-amount').value);

            if (!userWalletAddress) {
                alert('Будь ласка, спочатку підключіть ваш гаманець!');
                return;
            }
            if (isNaN(amount) || amount < 50) {
                alert('Мінімальна сума виведення — 50 UA!');
                return;
            }
            if (amount > coins) {
                alert('Недостатньо UA на балансі!');
                return;
            }

            coins -= amount;
            localStorage.setItem('bowling_coins', coins);
            document.getElementById('coins-val').innerText = coins;

            const cryptoCode = 'UA-CRYPTO-' + Math.floor(100000 + Math.random() * 900000);

            const textMessage = `👋 Привіт! Я хочу вивести ${amount} UA на свій гаманець.\n\n` + 
                                `📍 Адреса мого гаманця:\n${userWalletAddress}\n\n` +
                                `🔐 Код верифікації: ${cryptoCode}`;

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(textMessage).then(() => {
                    alert('📋 Заявку автоматично СКОПІЙОВАНО в буфер обміну!\n\nЗараз відкриється Telegram — просто натисніть "ВСТАВИТИ" у полі введення та надішліть повідомлення.');
                    redirectToTelegram();
                }).catch(err => {
                    fallbackCopyText(textMessage);
                });
            } else {
                fallbackCopyText(textMessage);
            }

            function fallbackCopyText(text) {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed"; 
                textArea.style.left = "-9999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try {
                    document.execCommand('copy');
                    alert('📋 Заявку СКОПІЙОВАНО!\n\nПерейдіть в Telegram та вставте текст.');
                } catch (err) {
                    alert('Помилка автокопіювання. Скопіюйте цей текст вручну:\n\n' + text);
                }
                document.body.removeChild(textArea);
                redirectToTelegram();
            }

            function redirectToTelegram() {
                withdrawOverlay.style.display = 'none';
                document.getElementById('withdraw-amount').value = '';
                setTimeout(() => {
                    window.location.href = 'https://t.me/Leslav';
                }, 100);
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight; camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
    </script>
</body>
</html>
