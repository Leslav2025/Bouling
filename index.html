<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UA Боулінг Клуб</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #f39c12;
            margin-bottom: 10px;
        }

        #game-container {
            position: relative;
            width: 400px;
            height: 600px;
            background: linear-gradient(to bottom, #2c3e50, #34495e);
            border: 4px solid #333;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        /* Доріжка */
        #lane {
            position: absolute;
            width: 160px;
            height: 100%;
            background: #e67e22;
            left: 120px;
            border-left: 4px dashed #d35400;
            border-right: 4px dashed #d35400;
        }

        /* Кеглі */
        #pins-container {
            position: absolute;
            top: 60px;
            width: 160px;
            left: 120px;
            height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .pin-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 6px;
        }

        .pin {
            width: 14px;
            height: 14px;
            background-color: #fff;
            border-radius: 50%;
            border: 2px solid #e74c3c;
            transition: all 0.3s ease;
        }

        .pin.hit {
            opacity: 0.1;
            transform: scale(0.5);
        }

        /* Куля */
        #ball {
            position: absolute;
            width: 24px;
            height: 24px;
            background: radial-gradient(circle at 30% 30%, #9b59b6, #8e44ad);
            border-radius: 50%;
            bottom: 50px;
            left: 188px; /* Центр доріжки: 120 + 80 - 12 */
            transition: bottom 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94), left 0.6s linear;
        }

        /* Приціл (стрілка) */
        #aimer {
            position: absolute;
            bottom: 80px;
            left: 200px;
            width: 2px;
            height: 60px;
            background: #f1c40f;
            transform-origin: bottom center;
            transform: rotate(0deg);
        }

        /* Інтерфейс */
        #ui {
            margin-top: 15px;
            text-align: center;
            width: 400px;
        }

        button {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background 0.2s;
        }

        button:hover {
            background-color: #2ecc71;
        }

        button:disabled {
            background-color: #7f8c8d;
            cursor: not-allowed;
        }

        #scoreboard {
            display: flex;
            justify-content: space-between;
            background: #2c3e50;
            padding: 10px 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 18px;
            border: 1px solid #444;
        }

        .status-msg {
            font-size: 20px;
            font-weight: bold;
            color: #f1c40f;
            height: 24px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>Bowling Club</h1>

    <div id="ui">
        <div id="scoreboard">
            <div>Фрейм: <span id="frame-val">1</span>/10</div>
            <div>Кидок: <span id="roll-val">1</span></div>
            <div>Очки: <span id="score-val">0</span></div>
        </div>
    </div>

    <div id="game-container">
        <div id="lane"></div>
        
        <div id="pins-container">
            <div class="pin-row" id="row-4">
                <div class="pin" id="pin-7"></div>
                <div class="pin" id="pin-8"></div>
                <div class="pin" id="pin-9"></div>
                <div class="pin" id="pin-10"></div>
            </div>
            <div class="pin-row" id="row-3">
                <div class="pin" id="pin-4"></div>
                <div class="pin" id="pin-5"></div>
                <div class="pin" id="pin-6"></div>
            </div>
            <div class="pin-row" id="row-2">
                <div class="pin" id="pin-2"></div>
                <div class="pin" id="pin-3"></div>
            </div>
            <div class="pin-row" id="row-1">
                <div class="pin" id="pin-1"></div>
            </div>
        </div>

        <div id="aimer"></div>
        <div id="ball"></div>
    </div>

    <div id="ui">
        <button id="shoot-btn">СТРІЛЯТИ!</button>
        <div class="status-msg" id="status-text">Прицілься та тисни кнопку!</div>
    </div>

    <script>
        // Ігрові змінні
        let currentFrame = 1;
        let currentRoll = 1;
        let totalScore = 0;
        let pinsLeft = 10;
        let pinStatus = Array(10).fill(true); // true = стоїть, false = збита

        // Логіка стрілки прицілу
        let angle = 0;
        let angleDirection = 1;
        let isAiming = true;
        let isRolling = false;

        const ball = document.getElementById('ball');
        const aimer = document.getElementById('aimer');
        const shootBtn = document.getElementById('shoot-btn');
        const statusText = document.getElementById('status-text');

        // Координати кожної кеглі відносно доріжки (для розрахунку збиття)
        // Спрощена логіка: залежність від фінального X кулі
        const pinPositionsX = {
            1: 0,          // Центр
            2: -15, 3: 15, // Другий ряд
            4: -30, 5: 0,  6: 30, // Третій ряд
            7: -45, 8: -15, 9: 15, 10: 45 // Четвертий ряд
        };

        // Анімація прицілу
        function updateAim() {
            if (!isAiming) return;

            angle += angleDirection * 1.5;
            if (angle > 45 || angle < -45) {
                angleDirection *= -1;
            }
            aimer.style.transform = `rotate(${angle}deg)`;
            requestAnimationFrame(updateAim);
        }
        updateAim();

        // Обробник натискання кнопки кидка
        shootBtn.addEventListener('click', () => {
            if (isRolling) return;
            
            isAiming = false;
            isRolling = true;
            shootBtn.disabled = true;
            statusText.innerText = "Куля котиться...";

            // Розрахунок кінцевої точки кулі на основі кута прицілу
            const radians = (angle * Math.PI) / 180;
            const targetY = 80; // Рівень кеглів
            const distanceY = 550 - targetY;
            const deviationX = distanceY * Math.sin(radians);
            
            const finalBallLeft = 188 + deviationX;

            // Запуск анімації кулі
            ball.style.bottom = '500px';
            ball.style.left = `${finalBallLeft}px`;
            aimer.style.opacity = '0';

            // Перевірка збиття кеглів після завершення кидка
            setTimeout(() => {
                calculateHit(deviationX);
            }, 600);
        });

        function calculateHit(finalX) {
            // Центр доріжки в системі координат відхилення — це 0
            // Радіус ураження кулі
            let hitCount = 0;

            for (let i = 1; i <= 10; i++) {
                if (pinStatus[i - 1]) {
                    // Фізика "вибуху": чим ближче куля до центру кеглі, тим вища ймовірність збиття
                    let distance = Math.abs(finalX - pinPositionsX[i]);
                    
                    // Якщо куля пройшла поруч (в межах 25px)
                    if (distance < 28) {
                        // Випадковий фактор збиття сусідніх кеглів
                        if (Math.random() > (distance / 35)) {
                            pinStatus[i - 1] = false;
                            document.getElementById(`pin-${i}`).classList.add('hit');
                            hitCount++;
                        }
                    }
                }
            }

            pinsLeft -= hitCount;
            totalScore += hitCount;
            
            // Оновлення табло
            document.getElementById('score-val').innerText = totalScore;

            // Логіка результату кидка
            if (currentRoll === 1) {
                if (pinsLeft === 0) {
                    statusText.innerText = "💥 STRIKE! 💥";
                    endFrame(true);
                } else {
                    statusText.innerText = `Збито кеглів: ${hitCount}. Другий кидок!`;
                    currentRoll = 2;
                    document.getElementById('roll-val').innerText = currentRoll;
                    resetBallOnly();
                }
            } else {
                if (pinsLeft === 0) {
                    statusText.innerText = "✨ SPARE! ✨";
                } else {
                    statusText.innerText = `Збито всього: ${10 - pinsLeft}`;
                }
                endFrame(false);
            }
        }

        function resetBallOnly() {
            setTimeout(() => {
                ball.style.transition = 'none';
                ball.style.bottom = '50px';
                ball.style.left = '188px';
                
                // Повертаємо приціл
                setTimeout(() => {
                    ball.style.transition = 'bottom 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94), left 0.6s linear';
                    aimer.style.opacity = '1';
                    isAiming = true;
                    isRolling = false;
                    shootBtn.disabled = false;
                    updateAim();
                }, 50);
            }, 1200);
        }

        function endFrame(isStrike) {
            setTimeout(() => {
                currentFrame++;
                if (currentFrame > 10) {
                    statusText.innerText = `Гра закінчена! Твій результат: ${totalScore} балів!`;
                    shootBtn.innerText = "ЗІГРАТИ ЗНОВУ";
                    shootBtn.disabled = false;
                    shootBtn.onclick = () => { location.reload(); };
                    return;
                }

                // Скидання до нового фрейму
                currentRoll = 1;
                pinsLeft = 10;
                pinStatus.fill(true);
                
                document.getElementById('frame-val').innerText = currentFrame;
                document.getElementById('roll-val').innerText = currentRoll;
                
                // Візуально відновлюємо кеглі
                document.querySelectorAll('.pin').forEach(p => p.classList.remove('hit'));
                
                // Повертаємо кулю
                ball.style.transition = 'none';
                ball.style.bottom = '50px';
                ball.style.left = '188px';
                
                setTimeout(() => {
                    ball.style.transition = 'bottom 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94), left 0.6s linear';
                    aimer.style.opacity = '1';
                    isAiming = true;
                    isRolling = false;
                    shootBtn.disabled = false;
                    statusText.innerText = "Прицілься та тисни кнопку!";
                    updateAim();
                }, 50);

            }, 1500);
        }
    </script>
</body>
</html>
