<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UA Боулінг Клуб</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #111827;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Верхня панель (Header) */
        .header-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #1f2937;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-bottom: 2px solid #374151;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .header-title {
            color: #f59e0b;
            text-align: center;
            font-size: 20px;
            padding: 5px 0;
            background-color: #111827;
        }

        /* Ігрова зона */
        .game-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background-color: #111827;
        }
        canvas {
            background-color: #1e3a8a; /* Колір бортів */
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        /* Підказка знизу */
        .footer-hint {
            text-align: center;
            padding: 10px;
            background-color: #1f2937;
            color: #9ca3af;
            font-size: 14px;
            border-top: 1px solid #374151;
        }
    </style>
</head>
<body>

    <div class="header-title">Bowling Club</div>
    
    <div class="header-panel">
        <div>Фрейм: <span id="frame-val">7/10</span></div>
        <div>Кидок: <span id="throw-val">1</span></div>
        <div>Очки: <span id="score-val">5</span></div>
    </div>

    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div class="footer-hint">Жолобни кулю пальцем вгору, щоб зробити кидок! 🎳</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Налаштування адаптивності Canvas під розмір екрану
        function resizeCanvas() {
            const container = canvas.parentElement;
            const size = Math.min(container.clientWidth, container.clientHeight);
            canvas.width = size * 0.95;
            canvas.height = size * 1.5; // Співвідношення сторін доріжки
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Параметри доріжки
        const laneColor = '#d97706'; // Помаранчева доріжка як на скріншоті

        // Позиції 10 кеглів (відносно ширини і висоти)
        let pins = [
            {x: 0.5, y: 0.15, active: true}, // 1-а кегля (попереду)
            {x: 0.45, y: 0.12, active: true}, {x: 0.55, y: 0.12, active: true},
            {x: 0.4, y: 0.09, active: true}, {x: 0.5, y: 0.09, active: true}, {x: 0.6, y: 0.09, active: true},
            {x: 0.35, y: 0.06, active: true}, {x: 0.45, y: 0.06, active: true}, {x: 0.55, y: 0.06, active: true}, {x: 0.65, y: 0.06, active: true}
        ];

        // Параметри кулі
        let ball = {
            x: canvas.width / 2,
            y: canvas.height * 0.85,
            radius: 15,
            vx: 0,
            vy: 0,
            isMoving: false
        };

        // Логіка трекінгу свайпу
        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', (e) => {
            if (ball.isMoving) return;
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchend', (e) => {
            if (ball.isMoving) return;
            
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;

            const diffX = touchEndX - touchStartX;
            const diffY = touchEndY - touchStartY;

            // Перевірка, що свайп був саме вгору
            if (diffY < -30) {
                ball.vx = diffX * 0.05; // Чутливість по горизонталі
                ball.vy = diffY * 0.05; // Швидкість польоту вгору
                ball.isMoving = true;
            }
        });

        // Перевірка колізій (збиття кеглів)
        function checkCollisions() {
            pins.forEach(pin => {
                if (!pin.active) return;
                
                // Переводимо відносні координати кеглі в реальні пікселі
                const pinX = pin.x * canvas.width;
                const pinY = pin.y * canvas.height;
                const pinRadius = 8;

                const dist = Math.hypot(ball.x - pinX, ball.y - pinY);
                if (dist < ball.radius + pinRadius) {
                    pin.active = false; // Кегля збита!
                    // Додаємо очки
                    let currentScore = parseInt(document.getElementById('score-val').innerText);
                    document.getElementById('score-val').innerText = currentScore + 1;
                }
            });
        }

        // Головний ігровий цикл (Оновлення екрану)
        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Малюємо борги та пунктирні лінії доріжки
            const laneWidth = canvas.width * 0.7;
            const laneX = (canvas.width - laneWidth) / 2;
            
            ctx.fillStyle = laneColor;
            ctx.fillRect(laneX, 0, laneWidth, canvas.height);

            // Пунктирні лінії зліва та справа
            ctx.strokeStyle = '#b45309';
            ctx.lineWidth = 3;
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(laneX, 0); ctx.lineTo(laneX, canvas.height);
            ctx.moveTo(laneX + laneWidth, 0); ctx.lineTo(laneX + laneWidth, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]); // Скидаємо пунктир

            // 2. Рух кулі
            if (ball.isMoving) {
                ball.x += ball.vx;
                ball.y += ball.vy;
                checkCollisions();

                // Якщо куля вилетіла за межі екрану — повертаємо її назад
                if (ball.y < 0 || ball.x < 0 || ball.x > canvas.width) {
                    ball.isMoving = false;
                    ball.x = canvas.width / 2;
                    ball.y = canvas.height * 0.85;
                    ball.vx = 0;
                    ball.vy = 0;
                    
                    // Оновлюємо кидок для прикладу
                    document.getElementById('throw-val').innerText = 2;
                }
            }

            // 3. Малюємо кеглі (білі кола)
            pins.forEach(pin => {
                if (!pin.active) return;
                ctx.beginPath();
                ctx.arc(pin.x * canvas.width, pin.y * canvas.height, 8, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.fill();
                ctx.closePath();
            });

            // 4. Малюємо кулю (фіолетова як на скріншоті)
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#a855f7';
            ctx.fill();
            ctx.strokeStyle = '#7e22ce';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.closePath();

            requestAnimationFrame(update);
        }

        // Запуск гри
        update();
    </script>
</body>
</html>
