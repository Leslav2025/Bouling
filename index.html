<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UA 3D Боулінг Клуб</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background-color: #0d131a;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 10px;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            color: #f39c12;
            margin: 5px 0;
            font-size: 22px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
        }

        #scoreboard {
            display: flex;
            flex-direction: column;
            background: rgba(28, 40, 51, 0.9);
            padding: 10px 15px;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            font-size: 14px;
            border: 1px solid #2c3e50;
            margin-bottom: 8px;
            z-index: 10;
            gap: 5px;
        }

        .score-row {
            display: flex;
            justify-content: space-between;
        }

        #high-score-container {
            text-align: center;
            color: #f1c40f;
            font-weight: bold;
            border-top: 1px dashed #34495e;
            padding-top: 4px;
            font-size: 13px;
        }

        #canvas-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 55vh;
            border: 3px solid #2c3e50;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.7);
        }

        /* Контейнер для шкал */
        #power-bar-container {
            position: absolute;
            left: 15px;
            bottom: 20px;
            width: 24px;
            height: 140px;
            background: rgba(0,0,0,0.5);
            border: 2px solid #fff;
            border-radius: 5px;
            display: none;
            flex-direction: column-reverse;
            overflow: hidden;
        }

        #power-bar-fill {
            width: 100%;
            height: 0%;
            background: linear-gradient(to top, #2ecc71, #f1c40f, #e74c3c);
            transition: height 0.05s linear;
        }

        #controls {
            width: 100%;
            max-width: 400px;
            text-align: center;
            margin-top: 10px;
            z-index: 10;
        }

        .status-msg {
            font-size: 16px;
            font-weight: bold;
            color: #f1c40f;
            margin-bottom: 8px;
            height: 20px;
            text-shadow: 0 1px 2px #000;
        }

        button {
            background: linear-gradient(135deg, #f39c12, #d35400);
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(243, 156, 18, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s, transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }

        button.ready-to-shoot {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            box-shadow: 0 4px 10px rgba(231, 76, 60, 0.4);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background: #7f8c8d;
            box-shadow: none;
            transform: none;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <h1>3D Bowling Club</h1>

    <div id="scoreboard">
        <div class="score-row">
            <div>Фрейм: <span id="frame-val">1</span>/10</div>
            <div>Кидок: <span id="roll-val">1</span></div>
            <div>Очки: <span id="score-val">0</span></div>
        </div>
        <div id="high-score-container">⭐ Мій рекорд: <span id="high-score-val">0</span></div>
    </div>

    <div id="canvas-container">
        <div id="power-bar-container">
            <div id="power-bar-fill"></div>
        </div>
    </div>

    <div id="controls">
        <div class="status-msg" id="status-text">Оберіть напрямок кидка!</div>
        <button id="action-btn">Зафіксувати приціл</button>
    </div>

    <script>
        let currentFrame = 1;
        let currentRoll = 1;
        let totalScore = 0;
        let pinsLeft = 10;
        let rolls = [];
        let highScore = localStorage.getItem('bowling_high_score') || 0;

        let gameState = 'aiming'; // aiming, power, rolling, calculating
        
        let angle = 0;
        let angleDirection = 1;
        let ballVelocityX = 0;
        let ballVelocityZ = 0;

        // Змінні для сили
        let powerValue = 0;
        let powerDirection = 1;

        let scene, camera, renderer;
        let ball, lane, aimerLine;
        let pins = [];
        const pinPositions = [
            {x: 0, z: -15}, 
            {x: -0.4, z: -15.6}, {x: 0.4, z: -15.6}, 
            {x: -0.8, z: -16.2}, {x: 0, z: -16.2}, {x: 0.8, z: -16.2}, 
            {x: -1.2, z: -16.8}, {x: -0.4, z: -16.8}, {x: 0.4, z: -16.8}, {x: 1.2, z: -16.8} 
        ];

        const container = document.getElementById('canvas-container');
        const actionBtn = document.getElementById('action-btn');
        const statusText = document.getElementById('status-text');
        const powerContainer = document.getElementById('power-bar-container');
        const powerFill = document.getElementById('power-bar-fill');

        document.getElementById('high-score-val').innerText = highScore;

        // Звуковий рушій
        let audioCtx = null;
        let rollSoundNode = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playRollSound() {
            initAudio();
            const bufferSize = audioCtx.sampleRate * 2;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }

            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            noise.loop = true;

            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(130, audioCtx.currentTime);

            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.25, audioCtx.currentTime);

            noise.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);

            noise.start();
            rollSoundNode = { source: noise, gain: gain };
        }

        function stopRollSound() {
            if (rollSoundNode) {
                try {
                    rollSoundNode.source.stop();
                } catch(e){}
                rollSoundNode = null;
            }
        }

        function playHitSound() {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(280, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(60, audioCtx.currentTime + 0.4);

            gain.gain.setValueAtTime(0.7, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);

            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);

            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.type = 'sine';
            osc2.frequency.setValueAtTime(750, audioCtx.currentTime);
            gain2.gain.setValueAtTime(0.25, audioCtx.currentTime);
            gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc2.connect(gain2);
            gain2.connect(audioCtx.destination);
            osc2.start();
            osc2.stop(audioCtx.currentTime + 0.3);
        }

        // Генерація красивої текстури дерева за допомогою HTML Canvas
        function createWoodTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 1024;
            const ctx = canvas.getContext('2d');

            // Основа дерева
            ctx.fillStyle = '#e67e22';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Малюємо дошки (паркет)
            ctx.fillStyle = '#d35400';
            for (let i = 0; i < canvas.width; i += 32) {
                ctx.fillRect(i, 0, 2, canvas.height);
            }

            // Текстурні волокна дерева
            ctx.strokeStyle = 'rgba(139, 69, 19, 0.15)';
            ctx.lineWidth = 1;
            for (let j = 0; j < canvas.height; j += 4) {
                ctx.beginPath();
                ctx.moveTo(0, j + Math.sin(j*0.05)*5);
                ctx.lineTo(canvas.width, j + Math.sin(j*0.05)*5);
                ctx.stroke();
            }

            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(1, 1);
            return texture;
        }

        // Текстура для більярдного ефекту кулі (глянець та смужка)
        function createBallTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = '#8e44ad'; // Фіолетова основа кулі
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#f1c40f'; // Золотиста смуга по центру для відстеження обертання
            ctx.fillRect(0, 100, canvas.width, 56);

            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(256, 128, 40, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#000000';
            ctx.font = 'bold 45px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('7', 256, 128);

            return new THREE.CanvasTexture(canvas);
        }

        init3D();
        animate();

        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0d131a);
            scene.fog = new THREE.FogExp2(0x0d131a, 0.05);

            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
            camera.position.set(0, 2.3, 5);
            camera.lookAt(0, 0.4, -10);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const spotLight = new THREE.SpotLight(0xffffff, 1);
            spotLight.position.set(0, 12, 4);
            spotLight.castShadow = true;
            scene.add(spotLight);

            // Доріжка з текстурою дерева
            const laneGeo = new THREE.BoxGeometry(3.5, 0.1, 25);
            const laneMat = new THREE.MeshStandardMaterial({ 
                map: createWoodTexture(),
                roughness: 0.1, 
                metalness: 0.1 
            });
            lane = new THREE.Mesh(laneGeo, laneMat);
            lane.position.set(0, -0.05, -7.5);
            lane.receiveShadow = true;
            scene.add(lane);

            // Бортики
            const wallGeo = new THREE.BoxGeometry(0.15, 0.4, 25);
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x1f2d3d, roughness: 0.5 });
            const leftWall = new THREE.Mesh(wallGeo, wallMat);
            leftWall.position.set(-1.82, 0.15, -7.5);
            scene.add(leftWall);
            const rightWall = leftWall.clone();
            rightWall.position.x = 1.82;
            scene.add(rightWall);

            // Куля зі стильною текстурою
            const ballGeo = new THREE.SphereGeometry(0.25, 32, 32);
            const ballMat = new THREE.MeshStandardMaterial({ 
                map: createBallTexture(),
                roughness: 0.05, 
                metalness: 0.2 
            });
            ball = new THREE.Mesh(ballGeo, ballMat);
            ball.position.set(0, 0.25, 3);
            ball.castShadow = true;
            scene.add(ball);

            // Яскрава лінія прицілу
            const points = [new THREE.Vector3(0, 0.06, 3), new THREE.Vector3(0, 0.06, -1)];
            const aimerGeo = new THREE.BufferGeometry().setFromPoints(points);
            const aimerMat = new THREE.LineBasicMaterial({ color: 0x00ffff, linewidth: 5 }); 
            aimerLine = new THREE.Line(aimerGeo, aimerMat);
            scene.add(aimerLine);

            createPins();
        }

        function createPins() {
            pins.forEach(p => scene.remove(p.mesh));
            pins = [];

            const pinMat = new THREE.MeshStandardMaterial({ color: 0xf5f6fa, roughness: 0.2 });
            const stripeMat = new THREE.MeshBasicMaterial({ color: 0xd63031 });

            pinPositions.forEach((pos) => {
                const pinGroup = new THREE.Group();

                const body = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.12, 0.5, 16), pinMat);
                body.position.y = 0.25;
                body.castShadow = true;
                pinGroup.add(body);

                const head = new THREE.Mesh(new THREE.SphereGeometry(0.07, 16, 16), pinMat);
                head.position.y = 0.53;
                pinGroup.add(head);

                const stripe = new THREE.Mesh(new THREE.CylinderGeometry(0.083, 0.083, 0.04, 16), stripeMat);
                stripe.position.y = 0.42;
                pinGroup.add(stripe);

                pinGroup.position.set(pos.x, 0, pos.z);
                scene.add(pinGroup);

                pins.push({
                    mesh: pinGroup, active: true,
                    vx: 0, vy: 0, vz: 0, rotX: 0, rotZ: 0
                });
            });
        }

        function animate() {
            requestAnimationFrame(animate);

            if (gameState === 'aiming') {
                angle += angleDirection * 0.011; 
                if (angle > 0.55 || angle < -0.55) {
                    angleDirection *= -1;
                }
                const targetX = Math.sin(angle) * 4;
                const targetZ = 3 - Math.cos(angle) * 4;
                
                const positions = aimerLine.geometry.attributes.position.array;
                positions[3] = targetX;
                positions[5] = targetZ;
                aimerLine.geometry.attributes.position.needsUpdate = true;
            }

            if (gameState === 'power') {
                powerValue += powerDirection * 2.5;
                if (powerValue > 100 || powerValue < 0) {
                    powerDirection *= -1;
                }
                powerFill.style.height = powerValue + '%';
            }

            if (gameState === 'rolling') {
                ball.position.x += ballVelocityX;
                ball.position.z += ballVelocityZ;
                
                // Куля красиво крутиться у напрямку руху
                ball.rotation.x -= 0.18;
                ball.rotation.y += ballVelocityX * 0.5;

                let playHit = false;
                pins.forEach(pin => {
                    if (pin.active) {
                        const dist = ball.position.distanceTo(pin.mesh.position);
                        if (dist < 0.42) {
                            pin.active = false;
                            pin.vz = ballVelocityZ * 0.85;
                            pin.vx = (pin.mesh.position.x - ball.position.x) * 0.6;
                            pin.vy = 0.18;
                            pin.rotX = Math.random() * 0.25;
                            pin.rotZ = (Math.random() - 0.5) * 0.25;
                            playHit = true;
                        }
                    }
                });

                if (playHit) {
                    playHitSound();
                }

                if (ball.position.z < -20) {
                    gameState = 'calculating';
                    stopRollSound();
                    calculateFrameResult();
                }
            }

            pins.forEach(pin => {
                if (!pin.active && Math.abs(pin.mesh.position.z) < 25) {
                    pin.mesh.position.x += pin.vx;
                    pin.mesh.position.y += pin.vy;
                    pin.mesh.position.z += pin.vz;
                    
                    if (pin.mesh.position.y > 0) {
                        pin.vy -= 0.012;
                    } else {
                        pin.mesh.position.y = 0;
                        pin.vx *= 0.85;
                        pin.vz *= 0.85;
                    }
                    pin.mesh.rotation.x += pin.rotX;
                    pin.mesh.rotation.z += pin.rotZ;
                }
            });

            renderer.render(scene, camera);
        }

        actionBtn.addEventListener('click', () => {
            initAudio(); 

            if (gameState === 'aiming') {
                gameState = 'power';
                powerValue = 0;
                powerDirection = 1;
                powerContainer.style.display = 'flex';
                actionBtn.innerText = "КИДОК!";
                actionBtn.classList.add('ready-to-shoot');
                statusText.innerText = "Впіймай максимальну силу кидка!";
            } 
            else if (gameState === 'power') {
                gameState = 'rolling';
                actionBtn.disabled = true;
                actionBtn.classList.remove('ready-to-shoot');
                aimerLine.visible = false;
                powerContainer.style.display = 'none';
                statusText.innerText = "Куля котиться до кеглів...";

                playRollSound();

                // Швидкість тепер залежить від зафіксованої сили (мінімум 0.15, максимум 0.42)
                const speed = 0.15 + (powerValue / 100) * 0.27;
                ballVelocityX = Math.sin(angle) * speed;
                ballVelocityZ = -Math.cos(angle) * speed;
            }
        });

        function calculateFrameResult() {
            let hitCount = 0;
            pins.forEach(pin => {
                if (!pin.active && pin.mesh.visible) {
                    pin.mesh.visible = false;
                    hitCount++;
                }
            });

            pinsLeft -= hitCount;
            rolls.push(hitCount);
            updateScoreDisplay();

            if (currentRoll === 1) {
                if (pinsLeft === 0) {
                    statusText.innerText = "💥 STRIIIIKE! 💥";
                    rolls.push(0);
                    endFrame();
                } else {
                    statusText.innerText = `Збито: ${hitCount}. Другий кидок!`;
                    currentRoll = 2;
                    document.getElementById('roll-val').innerText = currentRoll;
                    resetBallOnly();
                }
            } else {
                if (pinsLeft === 0) {
                    statusText.innerText = "✨ SPARE! ✨";
                } else {
                    statusText.innerText = `Результат фрейму: ${10 - pinsLeft} кеглів`;
                }
                endFrame();
            }
        }

        function updateScoreDisplay() {
            let score = 0;
            let rollIndex = 0;

            for (let frame = 0; frame < currentFrame; frame++) {
                if (rollIndex >= rolls.length) break;

                if (rolls[rollIndex] === 10) { 
                    score += 10 + (rolls[rollIndex + 1] || 0) + (rolls[rollIndex + 2] || 0);
                    rollIndex += 2;
                } else if ((rolls[rollIndex] + (rolls[rollIndex + 1] || 0)) === 10) { 
                    score += 10 + (rolls[rollIndex + 2] || 0);
                    rollIndex += 2;
                } else {
                    score += (rolls[rollIndex] || 0) + (rolls[rollIndex + 1] || 0);
                    rollIndex += 2;
                }
            }
            totalScore = score;
            document.getElementById('score-val').innerText = totalScore;

            // Оновлення найкращого рекорду в реальному часі
            if (totalScore > highScore) {
                highScore = totalScore;
                localStorage.setItem('bowling_high_score', highScore);
                document.getElementById('high-score-val').innerText = highScore;
            }
        }

        function resetBallOnly() {
            setTimeout(() => {
                ball.position.set(0, 0.25, 3);
                ball.rotation.set(0, 0, 0);
                aimerLine.visible = true;
                
                gameState = 'aiming';
                actionBtn.innerText = "Зафіксувати приціл";
                actionBtn.disabled = false;
                statusText.innerText = "Оберіть напрямок другого кидка!";
            }, 1000);
        }

        function endFrame() {
            setTimeout(() => {
                currentFrame++;
                
                if (currentFrame > 10) {
                    statusText.innerText = `Гру закінчено! Твій рахунок: ${totalScore}`;
                    actionBtn.innerText = "ЗІГРАТИ ЗНОВУ";
                    actionBtn.disabled = false;
                    actionBtn.onclick = () => { location.reload(); };
                    return;
                }

                currentRoll = 1;
                pinsLeft = 10;
                
                document.getElementById('frame-val').innerText = currentFrame;
                document.getElementById('roll-val').innerText = currentRoll;
                
                ball.position.set(0, 0.25, 3);
                ball.rotation.set(0, 0, 0);
                createPins();
                
                aimerLine.visible = true;
                gameState = 'aiming';
                actionBtn.innerText = "Зафіксувати приціл";
                actionBtn.disabled = false;
                statusText.innerText = "Оберіть напрямок кидка!";
            }, 1500);
        }

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
    </script>
</body>
</html>
